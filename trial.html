<!-- ============================================================
     TRIAL UI - HTML structure for the trial overlay
     Injected into the Qualtrics question body (or loaded externally).
     ============================================================ -->

<div id="trial-overlay">

    <!-- Fixation cross (shown for 1 000 ms before each trial) -->
    <div id="fixation">+</div>

    <!-- Three-image row: left flanker | center picture | right flanker -->
    <div id="image-row"></div>

    <!-- Slider row: sad emoji — slider — happy emoji -->
    <div id="slider-row">
        <span class="slider-icon">😞</span>
        <input id="rating-slider"
               type="range"
               min="-100"
               max="100"
               value="0"
               step="1" />
        <span class="slider-icon">😊</span>
    </div>

    <!-- Advance to next trial -->
    <button id="next-btn">next</button>
</div>
